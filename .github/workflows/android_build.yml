name: Build Android APK
on:
  push:
    branches: [main] # This triggers the build every time you push to 'main'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: mkdir -p out && touch out/index.html # Creates a dummy build folder for Capacitor
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: npx cap sync android # Syncs your Jumbostar config to the Android project
      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: jumbostar-wholesale-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk